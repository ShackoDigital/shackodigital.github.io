<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shacko Wear | Premium Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root { --gold: #d4af37; --dark-green: #0a2e1d; --black: #050505; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: var(--black); color: #fff; overflow-x: hidden; }
        
        /* Sayfalar arası geçişi garantiye alan yapı */
        .page { display: none; width: 100%; min-height: 100vh; }
        .active { display: flex !important; flex-direction: column; }

        /* GİRİŞ EKRANI */
        #authPage { background: radial-gradient(circle at center, var(--dark-green) 0%, #000 100%); align-items: center; justify-content: center; position: fixed; top: 0; left: 0; z-index: 999; }
        .auth-card { background: rgba(15, 15, 15, 0.95); padding: 40px 30px; border-radius: 35px; border: 1px solid rgba(212, 175, 55, 0.3); text-align: center; width: 85%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
        .logo { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 3.2em; line-height: 0.8; margin-bottom: 30px; }
        
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #222; background: #000; color: #fff; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); }
        .btn-gold { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--gold); color: #000; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 15px; }
        .toggle-btn { margin-top: 20px; font-size: 0.85em; color: #888; cursor: pointer; text-decoration: underline; }

        /* MAĞAZA EKRANI */
        #shopPage { background: var(--black); padding-bottom: 100px; }
        .nav { display: flex; overflow-x: auto; gap: 10px; padding: 15px; background: #000; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #111; scrollbar-width: none; }
        .nav-btn { padding: 10px 20px; border-radius: 20px; border: 1px solid #333; background: transparent; color: #fff; white-space: nowrap; font-size: 0.8em; font-weight: 600; cursor: pointer; }
        .nav-btn.active-cat { background: var(--gold); color: #000; border-color: var(--gold); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; max-width: 1000px; margin: auto; }
        .p-card { background: #111; border-radius: 25px; border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; text-align: center; padding-bottom: 15px; }
        .p-img { height: 120px; background: #181818; display: flex; align-items: center; justify-content: center; font-size: 2.5em; color: var(--gold); }
        .p-info { padding: 12px; flex-grow: 1; }
        .p-title { font-size: 0.85em; font-weight: 600; margin-bottom: 10px; min-height: 35px; color: #efefef; }
        
        .sizes { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-bottom: 15px; }
        .s-btn { padding: 5px 10px; font-size: 0.7em; border: 1px solid #333; background: transparent; color: #fff; border-radius: 8px; cursor: pointer; }
        .s-btn.selected { background: var(--gold); color: #000; border-color: var(--gold); }
        .buy-btn { width: 90%; padding: 12px; border: none; border-radius: 12px; background: var(--gold); color: #000; font-weight: 800; font-size: 0.75em; cursor: pointer; text-transform: uppercase; }

        /* FOOTER */
        .footer { text-align: center; padding: 20px; }
        .insta-btn { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #bc1888); color: #fff; padding: 12px 25px; border-radius: 30px; text-decoration: none; font-weight: 700; display: inline-block; margin-bottom: 15px; }
        .logout-btn { background: none; border: 1px solid #333; color: #555; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-size: 0.8em; }
    </style>
</head>
<body>

    <div id="authPage" class="page active">
        <div class="auth-card">
            <div class="logo">SHACKO<br><span style="margin-top:-10px; display:block;">WEAR</span></div>
            <p style="font-size: 0.6em; letter-spacing: 4px; color: #666; margin-top: -20px; margin-bottom: 30px;">ADANA PREMIUM COLLECTION</p>
            
            <div id="loginForm">
                <input type="email" id="lEmail" placeholder="E-posta">
                <input type="password" id="lPass" placeholder="Şifre">
                <button class="btn-gold" onclick="handleAuth('login')">GİRİŞ YAP</button>
                <div class="toggle-btn" onclick="toggleView(false)">Hesabın yok mu? Kayıt Ol</div>
            </div>

            <div id="regForm" style="display:none;">
                <input type="email" id="rEmail" placeholder="Yeni E-posta">
                <input type="password" id="rPass" placeholder="Şifre Belirle">
                <button class="btn-gold" onclick="handleAuth('reg')">KAYIT OL VE GİRİŞ YAP</button>
                <div class="toggle-btn" onclick="toggleView(true)">Zaten üye misin? Giriş Yap</div>
            </div>
        </div>
    </div>

    <div id="shopPage" class="page">
        <div class="nav">
            <button class="nav-btn active-cat" onclick="render('all', this)">Tümü</button>
            <button class="nav-btn" onclick="render('erkek', this)">Erkek</button>
            <button class="nav-btn" onclick="render('kadin', this)">Kadın</button>
            <button class="nav-btn" onclick="render('pantolon', this)">Düz Pantolon</button>
            <button class="nav-btn" onclick="render('takim', this)">Takımlar</button>
            <button class="nav-btn" onclick="render('cocuk', this)">Çocuk</button>
        </div>

        <div class="grid" id="mainGrid"></div>

        <div class="footer">
            <a href="https://www.instagram.com/shackowear" target="_blank" class="insta-btn">📸 INSTAGRAM'DA TAKİP ET</a><br>
            <button class="logout-btn" onclick="firebase.auth().signOut()">Oturumu Kapat</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, cat: 'erkek', title: 'V Yaka Slim Tişört', icon: '👕', sizes: ['S','M','L','XL','XXL'] },
            { id: 2, cat: 'erkek', title: 'Basic Oversize Tişört', icon: '👕', sizes: ['S','M','L','XL'] },
            { id: 3, cat: 'kadin', title: 'Fitilli Crop Top', icon: '👚', sizes: ['XS','S','M','L'] },
            { id: 4, cat: 'kadin', title: 'Yüksek Bel Tayt', icon: '🩱', sizes: ['S','M','L','XL'] },
            { id: 5, cat: 'pantolon', title: 'Siyah Kargo Pantolon', icon: '👖', sizes: ['28','29','30','32','34'] },
            { id: 6, cat: 'pantolon', title: 'Lacivert Düz Pantolon', icon: '👖', sizes: ['28','30','32','34','36'] },
            { id: 7, cat: 'takim', title: 'Oversize Eşofman Takımı', icon: '👟', sizes: ['S','M','L','XL'] },
            { id: 8, cat: 'takim', title: 'Düz Jogger Takımı', icon: '👟', sizes: ['S','M','L','XL'] },
            { id: 9, cat: 'cocuk', title: 'Kız Çocuk Elbise', icon: '👗', sizes: ['4-6Y','7-9Y','10-12Y'] },
            { id: 10, cat: 'cocuk', title: 'Erkek Çocuk Takım', icon: '👦', sizes: ['4-6Y','7-9Y','10-12Y'] }
        ];

        const firebaseConfig = {
            apiKey: "AIzaSyCLds70T1pcQagPA7PI8hts06IRluGoX7E",
            authDomain: "shackodigital.firebaseapp.com",
            projectId: "shackodigital",
            storageBucket: "shackodigital.firebasestorage.app",
            messagingSenderId: "926443383609",
            appId: "1:926443383609:web:180a2ea7795b7f833216e8"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function toggleView(isLogin) {
            document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
            document.getElementById('regForm').style.display = isLogin ? 'none' : 'block';
        }

        function handleAuth(mode) {
            const email = mode === 'login' ? document.getElementById('lEmail').value : document.getElementById('rEmail').value;
            const pass = mode === 'login' ? document.getElementById('lPass').value : document.getElementById('rPass').value;
            if(!email || !pass) return alert("Bilgileri doldur kanka!");

            if(mode === 'login') {
                auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
            } else {
                auth.createUserWithEmailAndPassword(email, pass).catch(e => alert(e.message));
            }
        }

        function render(cat, btn) {
            if(btn) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-cat'));
                btn.classList.add('active-cat');
            }
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            const filtered = cat === 'all' ? products : products.filter(p => p.cat === cat);
            
            filtered.forEach(p => {
                let sHtml = p.sizes.map(s => `<button class="s-btn" onclick="this.parentElement.querySelectorAll('.s-btn').forEach(b=>b.classList.remove('selected'));this.classList.add('selected')">${s}</button>`).join('');
                grid.innerHTML += `
                    <div class="p-card">
                        <div class="p-img">${p.icon}</div>
                        <div class="p-info">
                            <div class="p-title">${p.title}</div>
                            <div class="sizes">${sHtml}</div>
                            <button class="buy-btn" onclick="window.location.href='https://www.shopier.com/ShackoWear'">SİPARİŞİ TAMAMLA</button>
                        </div>
                    </div>
                `;
            });
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('authPage').classList.remove('active');
                document.getElementById('shopPage').classList.add('active');
                render('all');
            } else {
                document.getElementById('shopPage').classList.remove('active');
                document.getElementById('authPage').classList.add('active');
            }
        });
    </script>
</body>
</html>
