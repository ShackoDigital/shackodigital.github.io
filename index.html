<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shacko Wear | Premium Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --gold: #d4af37; 
            --dark-green: #0a2e1d; 
            --black: #050505; 
            --card-bg: #111; 
        }

        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: var(--black); color: #fff; overflow-x: hidden; }
        .page { display: none; padding: 15px; min-height: 100vh; }
        .active { display: flex; flex-direction: column; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Giriş Paneli - Premium Yeşil/Sarı Tema */
        #authPage {
            background: radial-gradient(circle at center, var(--dark-green) 0%, var(--black) 100%);
        }
        .auth-container { 
            background: rgba(17, 17, 17, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 40px; 
            padding: 50px 30px; 
            width: 85%; 
            max-width: 380px; 
            margin: 80px auto; 
            text-align: center; 
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
        }
        .brand-main { font-family: 'Playfair Display', serif; color: var(--gold); font-weight: 900; font-size: 3em; margin: 0; letter-spacing: -1px; }
        .brand-sub { color: #fff; font-size: 0.65em; text-transform: uppercase; letter-spacing: 4px; margin-top: 5px; opacity: 0.8; }

        input { width: 100%; padding: 16px; margin: 12px 0; border-radius: 15px; border: 1px solid #222; background: rgba(0,0,0,0.6); color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); background: rgba(0,0,0,0.8); }
        .btn-main { width: 100%; padding: 16px; border: none; border-radius: 15px; background: var(--gold); color: #000; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 20px; transition: 0.3s; }
        .btn-main:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(212,175,55,0.3); }

        /* Mağaza Arayüzü */
        .category-nav { display: flex; overflow-x: auto; gap: 10px; padding: 15px; background: #000; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #111; scrollbar-width: none; }
        .cat-btn { padding: 10px 22px; border-radius: 25px; border: 1px solid #333; background: transparent; color: #fff; white-space: nowrap; cursor: pointer; font-size: 0.8em; font-weight: 600; transition: 0.3s; }
        .cat-btn.active-cat { background: var(--gold); color: #000; border-color: var(--gold); }

        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 900px; margin: 15px auto; padding-bottom: 100px; }
        .p-card { background: var(--card-bg); border-radius: 25px; border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; }
        .p-img { width: 100%; height: 140px; display: flex; align-items: center; justify-content: center; font-size: 2.5em; background: #1a1a1a; color: var(--gold); }
        .p-info { padding: 15px; flex-grow: 1; text-align: center; }
        .p-title { font-size: 0.85em; font-weight: 600; color: #fff; margin-bottom: 12px; min-height: 35px; }
        
        .size-selector { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-bottom: 15px; }
        .size-btn { padding: 5px 10px; font-size: 0.7em; border: 1px solid #333; background: transparent; color: #fff; border-radius: 8px; cursor: pointer; }
        .size-btn.selected { background: var(--gold); color: #000; border-color: var(--gold); }
        
        .btn-buy { width: 100%; padding: 12px; border: none; border-radius: 12px; background: var(--gold); color: #000; font-weight: 800; cursor: pointer; font-size: 0.8em; text-transform: uppercase; }
        #logoutBtn { margin: 30px auto; background: none; border: 1px solid #333; color: #777; padding: 10px 30px; border-radius: 15px; cursor: pointer; display: block; }
    </style>
</head>
<body>

    <div id="authPage" class="page active">
        <div class="auth-container">
            <h1 class="brand-main">SHACKO</h1>
            <h1 class="brand-main" style="margin-top:-15px;">WEAR</h1>
            <div class="brand-sub">Premium Collection 2026</div>
            <input type="email" id="lEmail" placeholder="E-posta">
            <input type="password" id="lPass" placeholder="Şifre">
            <button class="btn-main" onclick="handleLogin()">Mağazaya Giriş Yap</button>
        </div>
    </div>

    <div id="shopPage" class="page">
        <div class="category-nav">
            <button class="cat-btn active-cat" onclick="filterCat('all', this)">Tümü</button>
            <button class="cat-btn" onclick="filterCat('erkek', this)">Erkek</button>
            <button class="cat-btn" onclick="filterCat('kadin', this)">Kadın</button>
            <button class="cat-btn" onclick="filterCat('pantolon', this)">Düz Pantolon</button>
            <button class="cat-btn" onclick="filterCat('cocuk', this)">Çocuk</button>
            <button class="cat-btn" onclick="filterCat('esofman', this)">Eşofman Takım</button>
        </div>
        <div class="product-grid" id="mainGrid"></div>
        <button id="logoutBtn" onclick="handleLogout()">Oturumu Kapat</button>
    </div>

    <script>
        const products = [
            // ERKEK (V Yaka'ya S eklendi)
            { id: 1, cat: 'erkek', title: 'V Yaka Slim Tişört', icon: '👕', sizes: ['S','M','L','XL','XXL'] },
            { id: 2, cat: 'erkek', title: 'Basic Oversize Tişört', icon: '👕', sizes: ['S','M','L','XL'] },

            // KADIN
            { id: 3, cat: 'kadin', title: 'Premium Crop Top', icon: '👚', sizes: ['S','M','L'] },
            { id: 4, cat: 'kadin', title: 'Düz Tayt', icon: '🩱', sizes: ['S','M','L','XL'] },

            // DÜZ PANTOLONLAR (28 29 eklendi)
            { id: 5, cat: 'pantolon', title: 'Siyah Kargo Pantolon', icon: '👖', sizes: ['28','29','30','31','32','34'] },
            { id: 6, cat: 'pantolon', title: 'Lacivert Düz Pantolon', icon: '👖', sizes: ['28','30','32','34','36'] },

            // ÇOCUK (Sadeleştirildi)
            { id: 7, cat: 'cocuk', title: 'Kız Çocuk', icon: '👗', sizes: ['4-6Y','7-9Y','10-12Y'] },
            { id: 8, cat: 'cocuk', title: 'Erkek Çocuk', icon: '👦', sizes: ['4-6Y','7-9Y','10-12Y'] },

            // EŞOFMAN (Jogger'a S eklendi)
            { id: 9, cat: 'esofman', title: 'Oversize Eşofman Takımı', icon: '👟', sizes: ['S','M','L','XL'] },
            { id: 10, cat: 'esofman', title: 'Düz Jogger Takımı', icon: 'S','M','L','XL'] }
        ];

        const firebaseConfig = {
            apiKey: "AIzaSyCLds70T1pcQagPA7PI8hts06IRluGoX7E",
            authDomain: "shackodigital.firebaseapp.com",
            projectId: "shackodigital",
            storageBucket: "shackodigital.firebasestorage.app",
            messagingSenderId: "926443383609",
            appId: "1:926443383609:web:180a2ea7795b7f833216e8"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function handleLogin() {
            const e = document.getElementById('lEmail').value;
            const p = document.getElementById('lPass').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Hata: Giriş bilgileri geçersiz."));
        }
        function handleLogout() { auth.signOut(); }

        function selectSize(btn) {
            btn.parentElement.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function filterCat(category, btn) {
            if(btn) {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-cat'));
                btn.classList.add('active-cat');
            }
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            const filtered = category === 'all' ? products : products.filter(p => p.cat === category);
            
            filtered.forEach(p => {
                let sizeHtml = p.sizes.map(s => `<button class="size-btn" onclick="selectSize(this)">${s}</button>`).join('');
                grid.innerHTML += `
                    <div class="p-card">
                        <div class="p-img">${p.icon}</div>
                        <div class="p-info">
                            <div class="p-title">${p.title}</div>
                            <div class="size-selector">${sizeHtml}</div>
                            <button class="btn-buy" onclick="window.location.href='https://www.shopier.com/ShackoWear'">SİPARİŞİ TAMAMLA</button>
                        </div>
                    </div>
                `;
            });
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('authPage').classList.remove('active');
                document.getElementById('shopPage').classList.add('active');
                filterCat('all');
            } else {
                document.getElementById('shopPage').classList.remove('active');
                document.getElementById('authPage').classList.add('active');
            }
        });
    </script>
</body>
</html>
